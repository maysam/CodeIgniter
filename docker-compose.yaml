services:
  weblog:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "80"
    depends_on:
      - mysql
    environment:
      CI_ENV: development
    volumes:
      - ./:/var/www/html

  mysql:
    image: mysql:5.7
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ci_weblog
      MYSQL_USER: ci_user
      MYSQL_PASSWORD: ci_password
    expose:
      - "3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d

volumes:
  mysql_data:
