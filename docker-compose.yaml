services:
  mysql:
    image: mysql:5.7
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ci_weblog
      MYSQL_USER: ci_user
      MYSQL_PASSWORD: ci_password
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro

  mysql-bootstrap:
    image: mysql:5.7
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      MYSQL_HOST: mysql
      MYSQL_DATABASE: ci_weblog
      MYSQL_USER: ci_user
      MYSQL_PASSWORD: ci_password
    volumes:
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    entrypoint:
      - sh
      - -ec
      - |
        mysql -h "$$MYSQL_HOST" -u "$$MYSQL_USER" -p"$$MYSQL_PASSWORD" "$$MYSQL_DATABASE" < /docker-entrypoint-initdb.d/01_schema.sql
    restart: "no"

  weblog:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      mysql:
        condition: service_healthy
      mysql-bootstrap:
        condition: service_completed_successfully
    environment:
      CI_ENV: development
      DB_HOST: mysql
      DB_NAME: ci_weblog
      DB_USER: ci_user
      DB_PASSWORD: ci_password
    expose:
      - "80"

volumes:
  mysql_data:
